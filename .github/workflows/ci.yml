name: CI — Test, Lint, Architecture, Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Job 1: Lint & Format
  # ===========================================================================
  lint:
    name: 🧹 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

  # ===========================================================================
  # Job 2: Tests with Coverage
  # ===========================================================================
  test:
    name: 🧪 Test (Coverage ≥80%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: TDD check
        run: npm run tdd:check

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            Server/coverage/
            Client/coverage/

  # ===========================================================================
  # Job 3: Architecture Validation
  # ===========================================================================
  architecture:
    name: 🏗️ Architecture Boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Validate architecture
        run: npm run check:architecture

  # ===========================================================================
  # Job 4: Security Audit
  # ===========================================================================
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high || true
        continue-on-error: true

      - name: Custom security checks
        run: npm run audit:security

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: reports/security/

  # ===========================================================================
  # Job 5: Build Check
  # ===========================================================================
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    needs: [lint, test, architecture, security]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: TypeScript compilation
        run: npm run build
