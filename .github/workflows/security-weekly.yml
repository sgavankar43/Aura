name: Weekly Security Audit

on:
  schedule:
    # Every Monday at 9:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  full-audit:
    name: 🔒 Full Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for gitleaks

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # --- npm audit ---
      - name: Dependency vulnerability scan
        run: npm audit --json > reports/security/npm-audit.json 2>/dev/null || true
        continue-on-error: true

      # --- Gitleaks ---
      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_8.18.4_linux_x64.tar.gz | tar xz
          sudo mv gitleaks /usr/local/bin/

      - name: Secrets detection
        run: gitleaks detect --config .gitleaks.toml --report-path reports/security/gitleaks.json || true
        continue-on-error: true

      # --- Custom security checks ---
      - name: Run security audit script
        run: bash scripts/security-audit.sh || true
        continue-on-error: true

      # --- Upload reports ---
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: weekly-security-report-${{ github.run_number }}
          path: reports/security/
          retention-days: 90

      # --- Create issue if vulnerabilities found ---
      - name: Create GitHub issue on findings
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🔒 Weekly Security Audit — Findings (${new Date().toISOString().split('T')[0]})`;
            const body = `## Security audit detected potential issues\n\nRun: ${context.runId}\n\nPlease review the security reports artifact for details.\n\n/cc @${context.actor}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security', 'automated']
            });
