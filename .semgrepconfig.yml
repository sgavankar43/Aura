# =============================================================================
# Semgrep SAST Rules for Aura
# Static Application Security Testing configuration
# =============================================================================

rules:
  - id: no-eval-usage
    patterns:
      - pattern: eval(...)
    message: "eval() usage detected — this enables code injection attacks"
    languages: [typescript, javascript]
    severity: ERROR
    metadata:
      category: security
      owasp: A03:2021 Injection

  - id: no-function-constructor
    patterns:
      - pattern: new Function(...)
    message: "Function constructor detected — equivalent to eval()"
    languages: [typescript, javascript]
    severity: ERROR
    metadata:
      category: security
      owasp: A03:2021 Injection

  - id: no-hardcoded-passwords
    patterns:
      - pattern: |
          password = "..."
      - pattern: |
          password: "..."
    message: "Hardcoded password detected — use environment variables"
    languages: [typescript, javascript]
    severity: ERROR
    metadata:
      category: security
      owasp: A07:2021 Identification and Authentication Failures

  - id: no-hardcoded-api-keys
    patterns:
      - pattern: |
          apiKey = "..."
      - pattern: |
          api_key = "..."
      - pattern: |
          API_KEY = "..."
    message: "Hardcoded API key detected — use environment variables"
    languages: [typescript, javascript]
    severity: ERROR
    metadata:
      category: security
      owasp: A07:2021 Identification and Authentication Failures

  - id: no-sql-string-concat
    patterns:
      - pattern: |
          $QUERY = "..." + $INPUT
      - pattern: |
          $QUERY = `...${$INPUT}...`
    message: "SQL string concatenation detected — use parameterized queries"
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      category: security
      owasp: A03:2021 Injection

  - id: no-unsafe-innerhtml
    patterns:
      - pattern: |
          $EL.innerHTML = $VALUE
    message: "Direct innerHTML assignment — sanitize input or use textContent"
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      category: security
      owasp: A03:2021 Injection

  - id: no-exec-sync
    patterns:
      - pattern: |
          execSync(...)
      - pattern: |
          exec(...)
    message: "Shell command execution detected — validate and sanitize all inputs"
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      category: security
      owasp: A03:2021 Injection

  - id: crypto-weak-algorithm
    patterns:
      - pattern: |
          createHash("md5")
      - pattern: |
          createHash("sha1")
    message: "Weak hash algorithm detected — use SHA-256 or stronger"
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      category: security
      owasp: A02:2021 Cryptographic Failures
